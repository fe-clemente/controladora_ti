<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login — Divino Fogão</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f3ef;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            max-width: 400px;
            width: 100%;
        }
        .logo { font-size: 48px; margin-bottom: 8px; }
        h1 { color: #c8102e; font-size: 22px; margin-bottom: 4px; }
        p  { color: #666; font-size: 14px; margin-bottom: 32px; }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-google:hover {
            border-color: #c8102e;
            box-shadow: 0 4px 12px rgba(200,16,46,0.15);
        }
        .aviso {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        .erro {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            color: #c8102e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
<img src="/logo.png" alt="Divino Fogão" style="width:120px;margin-bottom:8px;">
        <h1>Divino Fogão</h1>
        <p>Central de Treinamentos</p>

        <div id="erro" class="erro" style="display:none">
            ⚠️ Acesso permitido apenas para e-mails @divinofogao.com.br
        </div>

        <a href="/auth/google" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Entrar com Google
        </a>

        <p class="aviso">Somente contas @divinofogao.com.br</p>
    </div>

    <script>
        // Mostra mensagem de erro se veio redirecionado
        if (new URLSearchParams(location.search).get('erro') === 'dominio') {
            document.getElementById('erro').style.display = 'block';
        }
    </script>
</body>
</html>
